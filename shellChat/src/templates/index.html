<!DOCTYPE html>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    #root {
        width: 100%;
        height: 100%;
        background: #232323;
        display: flex;
    }
</style>
  <div id="root"></div>
<body>
<script>
    async function initFetch() {
        try {
            const response = await fetch(`http://localhost:8000/`, {
                method: 'GET',
            })

            const page = await response.text()

            const main = document.getElementById('root')

            main.innerHTML = page
            
        } catch (error) {
            console.warn("Erro", error)
        }
    }

window.onload = () => {
    initFetch()
}
